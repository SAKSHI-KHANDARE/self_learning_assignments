<!DOCTYPE html>
<html>
    <body>
        <script>

function Person(name, age){
    this.name = name;
    this.age = age;
}

// prototype function
Person.prototype.print = function(){
    document.write("Name: " + this.name + " Age: " + this.age + "<br>");
}

// objects
let p1 = new Person("shivani", 20);
let p2 = new Person("sakshi", 22);

p1.print();
p2.print();

</script>
    </body>
</html>
