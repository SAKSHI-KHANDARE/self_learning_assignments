<!DOCTYPE html>
<html>
<head>
<title>Star Pattern</title>
</head>
<body>

<h3>Star Pattern</h3>
<pre id="pattern"></pre>

<script>
let rows = 3;
let output = "";

for (let i = rows; i >= 1; i--) {
    for (let j = 1; j <= i; j++) {
        output += "* ";
    }
    output += "\n";
}

document.getElementById("pattern").textContent = output;
</script>

</body>
</html>
