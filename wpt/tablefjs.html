<!DOCTYPE html>
<html>
<head>
    <title>Table Using Function</title>
</head>
<body>

<script>
    // Declare a variable
    let num = 5;

    // Function to print table
    function printTable(n) {
        for (let i = 1; i <= 10; i++) {
            console.log(n + " x " + i + " = " + (n * i));
        }
    }

    // Call the function
    printTable(num);
</script>

</body>
</html>
