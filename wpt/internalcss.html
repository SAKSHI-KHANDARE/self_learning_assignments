<!DOCTYPE html>
<html>
<head>
<title>Text Fields and Image</title>

<style>

body{
    margin-left: 50px;
    margin-right: 50px;
    font-family: Arial;
}

/* Container for inputs */
.input-container{
    display: flex;
    gap: 20px;
}

/* Text fields styling */
.input-container input{
    border: 3px solid blue;
    padding: 8px;
    width: 200px;
}

/* Image styling */
.image-box{
    margin-top: 40px;
}

.image-box img{
    border: 4px solid red;
    border-radius: 15px;
    width: 300px;
}

</style>
</head>

<body>

<div class="input-container">
    <input type="text" placeholder="First Name">
    <input type="text" placeholder="Middle Name">
    <input type="text" placeholder="Last Name">
</div>

<div class="image-box">
    <img src="C:\Users\admin\Downloads\imagesf.jfif" alt="Sample Image">
</div>

</body>
</html>
