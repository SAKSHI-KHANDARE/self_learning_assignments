<!DOCTYPE html>
<html>
<head>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<script>
$(document).ready(function(){

$("#btn").click(function(){

let title = $("#title").val();

$.ajax({
url:"https://jsonplaceholder.typicode.com/todos",
type:"POST",
data:{
title:title,
completed:false
},
success:function(response){
$("#result").html("Data Posted Successfully<br>"+JSON.stringify(response));
}
});

});

});
</script>

</head>

<body>

Enter Title:
<input type="text" id="title">

<br><br>

<button id="btn">POST DATA</button>

<div id="result"></div>

</body>
</html>
